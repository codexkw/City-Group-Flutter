workflows:
  default-workflow:
    name: City Group Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        - app_credentials  # Create this group in Codemagic UI for signing keys

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
          source: true

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Generate localizations
        script: flutter gen-l10n

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      # --- Android ---
      - name: Build APK (Release)
        script: flutter build apk --release

      # --- iOS ---
      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles
        ignore_failure: true  # Remove this once signing is configured

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
        ignore_failure: true  # Remove this once signing is configured

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - anas@codexkw.com
        notify:
          success: true
          failure: true
