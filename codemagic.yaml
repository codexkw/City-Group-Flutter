workflows:
  default-workflow:
    name: City Group Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      xcode: 16.2
      cocoapods: default
      groups:
        - City-Group

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: master
          include: true
          source: true

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Generate localizations
        script: flutter gen-l10n

      - name: Analyze
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      # --- Android ---
      - name: Build APK (Release)
        script: flutter build apk --release

      # --- iOS ---
      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.codexkw.citygroup" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --verbose
          keychain add-certificates
          xcode-project use-profiles

      - name: Prepare iOS build
        script: |
          # Generate Xcode project without building
          flutter build ios --config-only --release --no-codesign
          # Re-run pod install to apply our Podfile fixes
          cd ios
          pod install

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - anas@codexkw.com
        notify:
          success: true
          failure: true
